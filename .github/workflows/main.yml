name: Daily Stock Data Crawl

on:
  schedule:
    - cron: '0 9 * * 1-5' # 每周一至周五，北京时间 17:00 运行 (UTC 9:00)
  workflow_dispatch:      # 允许手动点击运行按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行爬虫脚本
        run: python 你的文件名.py  # 替换成你脚本的名字

      - name: 提交并推送结果到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add 行业涨跌停统计_每日追加.xlsx
          git commit -m "自动更新数据: $(date +'%Y-%m-%d')" || exit 0
          git push
